<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="sparkleCanvas"></canvas>

<audio id="popSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c3c89b9b4.mp3">
</audio>

<div class="container">

<!-- PAGE 1 -->

<div class="page active">

<h1 class="name">Hey Cutiee..</h1>

<p id="typeText"></p>

<button onclick="nextPage()">Open Surprise</button>

</div>


<!-- PAGE 2 BALLOONS -->

<div class="page">

<h2>Pop all balloons 🎈</h2>

<div class="hiddenWords">

<span id="w1">You</span>
<span id="w2">are</span>
<span id="w3">very</span>
<span id="w4">Beautiful</span>

</div>

<div class="balloonRow">

<div class="balloonWrap">
<div class="balloon pink" onclick="popBalloon(this,'w1')"></div>
<div class="string"></div>
</div>

<div class="balloonWrap">
<div class="balloon peach" onclick="popBalloon(this,'w2')"></div>
<div class="string"></div>
</div>

<div class="balloonWrap">
<div class="balloon coral" onclick="popBalloon(this,'w3')"></div>
<div class="string"></div>
</div>

<div class="balloonWrap">
<div class="balloon purple" onclick="popBalloon(this,'w4')"></div>
<div class="string"></div>
</div>

</div>

</div>


<!-- FINAL PAGE -->

<div class="page">

<h1 class="finalTitle">Happy Birthday Dear🎂</h1>

<p class="wish">
May your life be full of happiness, smiles and love 💖
</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
