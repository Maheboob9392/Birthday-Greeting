<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>

<div class="phone">

<!-- Page 1 -->
<section class="page active">

<h2>A Special Message</h2>
<p class="tap">Tap to open</p>

<div class="card">
<h1>Happy Birthday<br>to you</h1>
</div>

<button onclick="nextPage()">Next →</button>

</section>


<!-- Page 2 -->
<section class="page">

<div class="card">

<h2>You</h2>
<h2>are</h2>
<h2>a</h2>
<h2>Cutiee 💖</h2>

</div>

<button onclick="nextPage()">Next →</button>

</section>


<!-- Page 3 Balloon Game -->
<section class="page">

<h2>Pop all balloons 🎈</h2>

<div class="balloon-area">

<!-- Hidden words -->
<div class="hidden-text">
<span id="w1">You</span>
<span id="w2">are</span>
<span id="w3">very</span>
<span id="w4">Beautiful</span>
</div>

<!-- Balloons -->
<div class="balloons">

<div class="balloon-wrap">
<div class="balloon pink" onclick="popBalloon(this,'w1')"></div>
<div class="string"></div>
</div>

<div class="balloon-wrap">
<div class="balloon peach" onclick="popBalloon(this,'w2')"></div>
<div class="string"></div>
</div>

<div class="balloon-wrap">
<div class="balloon coral" onclick="popBalloon(this,'w3')"></div>
<div class="string"></div>
</div>

<div class="balloon-wrap">
<div class="balloon purple" onclick="popBalloon(this,'w4')"></div>
<div class="string"></div>
</div>

</div>

</div>

<button id="finalBtn" onclick="nextPage()">Next →</button>

</section>


<!-- Final Page -->
<section class="page final">

<h1>Happy Birthday Cutiepiee! 🎂</h1>

<div class="cake">🎂</div>

<p class="wish">
May your day be filled with happiness, love and smiles 💖
</p>

</section>

</div>

<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>
</html>
