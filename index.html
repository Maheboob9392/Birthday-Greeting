<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="sparkles"></canvas>

<audio id="popSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_03c1b1c5f1.mp3?filename=balloon-pop-124476.mp3">
</audio>

<div class="container">

<!-- PAGE 1 -->

<div class="page active">

<h2 id="nameTitle">Happy Birthday Sample 🎉</h2>

<div class="card">

<h1 id="typeMessage"></h1>

</div>

<button onclick="nextPage()">Next →</button>

</div>


<!-- PAGE 2 -->

<div class="page">

<h2>Pop the balloons 🎈</h2>

<div class="hidden-text">

<span id="w1">You</span>
<span id="w2">are</span>
<span id="w3">very</span>
<span id="w4">Beautiful</span>

</div>

<div class="balloons">

<div class="balloon-wrap">
<div class="balloon pink" onclick="popBalloon(this,'w1')"></div>
<div class="string"></div>
</div>

<div class="balloon-wrap">
<div class="balloon peach" onclick="popBalloon(this,'w2')"></div>
<div class="string"></div>
</div>

<div class="balloon-wrap">
<div class="balloon coral" onclick="popBalloon(this,'w3')"></div>
<div class="string"></div>
</div>

<div class="balloon-wrap">
<div class="balloon purple" onclick="popBalloon(this,'w4')"></div>
<div class="string"></div>
</div>

</div>

</div>


<!-- FINAL PAGE -->

<div class="page final">

<h1>Happy Birthday Sample 🎂</h1>

<p class="wish">

May your life be full of happiness, love and endless smiles 💖

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
